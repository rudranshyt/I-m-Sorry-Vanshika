<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry Vanshika</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="overlay">
        <h1>For Vanshika ❤️</h1>
        <p>Tap to open</p>
    </div>

    <div class="main">
        <div class="image-container">
            <img src="/images/D32E7CF3-C7FC-4216-9181-53400EA1EB25.jpeg" alt="Vanshika">
        </div>

        <div id="content-box">
            <h2 id="statusText" class="message">I'm So Sorry!</h2>
            <p id="subText">Will you forgive me?</p>

            <div class="button-group">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
        </div>
    </div>

    <audio id="sorryAudio" src="/images/audio.mp3"></audio>

    <script src="app.js"></script>
</body>

</html>
